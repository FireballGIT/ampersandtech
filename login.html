<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>AMPERSAND - Communications Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Better Lexend setup -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        #page-fade { position: fixed; inset: 0; background: var(--bg-light); pointer-events: none; opacity: 1; transition: opacity 0.9s ease; z-index: 9999; }
        /* Dark mode support */
        body.dark #page-fade { background: var(--bg-dark); }
        /* When page is fully visible */
        body.loaded #page-fade { opacity: 0; }

        :root {
            --main-color: seagreen;
            --bg-light: #ffffff;
            --bg-dark: #1f1f1f;
            --text-light: #1a1a1a;
            --text-dark: #f5f5f5;
            /* Header colors */
            --header-light: #f4f7f5;
            --header-dark: #111111;
        }

        body {
            margin: 0;
            font-family: 'Lexend', sans-serif;
            font-weight: 400;
            line-height: 1.7;
            letter-spacing: 0.3px;
            background-color: var(--bg-light);
            color: var(--text-light);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-light);
            color: var(--text-light);
            padding: 28px 20px;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
            border-bottom: 2px solid rgba(0,0,0,0.06);
        }

        header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 2.3rem;
            letter-spacing: 1px;
        }

        .ampersand {
            color: var(--main-color);
        }

        main {
            padding: 30px 25px;
            max-width: 800px;
            margin: auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- CHAT MODULE STYLES --- */
        #chat-box {
            flex: 1;
            min-height: 50vh;
            max-height: 55vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: background-color 0.3s, border-color 0.3s;
        }
        body.dark #chat-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .system-msg {
            color: #888;
            font-style: italic;
            font-size: 0.95rem;
            margin: 10px 0;
            text-align: center;
            font-weight: 300;
        }

        .user-msg {
            margin: 10px 0;
            font-size: 1.05rem;
            font-weight: 300;
        }

        .user-name {
            color: var(--main-color);
            font-weight: 500;
            margin-right: 6px;
        }

        #input-area {
            display: flex;
            gap: 12px;
        }

        #msg-input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-family: 'Lexend', sans-serif;
            background: transparent;
            color: inherit;
            transition: border-color 0.3s;
            font-size: 1rem;
        }
        body.dark #msg-input { border-color: #444; }
        #msg-input:focus { outline: none; border-color: var(--main-color); }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background-color: var(--main-color);
            color: white;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: auto;
        }

        body.dark {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark header {
            background-color: var(--header-dark);
            color: var(--text-dark);
            border-bottom: 2px solid rgba(255,255,255,0.08);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 20px 20px;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- --- REJECTION FRAME BLOCK (Hidden by default) --- -->
    <div id="secureShieldBlock" style="display:none; position:fixed; inset:0; background:#121212; color:white; z-index:100000; text-align:center; padding-top:100px; font-family:'Lexend', sans-serif;">
        <h1 style="color:#ff5252;">ACCESS DENIED: SECURITY VIOLATION</h1>
        <hr style="width:50px; border-color:#ff5252; margin:20px auto;">
        <p style="opacity:0.8; font-weight:300;">Teammate signature verification registers failed.</p>
        <p style="opacity:0.6; font-weight:300; font-size:0.9rem;">You must validate your credentials via the primary node portal.</p>
        <button onclick="window.location.href='login.html'" style="margin-top:20px;">Return to Portal</button>
    </div>

    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="ampersand">&amp;</span>AMPERSAND
            </div>
        </nav>
        <div class="hero">
            <h1><span class="ampersand">SYSTEM</span> CHAT</h1>
        </div>
    </header>

    <main>
        <div id="chat-box"></div>
        <div id="input-area">
            <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button style="width: auto; background-color: #ff5252;" onclick="handleLogout()">Disconnect Session</button>
            <button style="width: auto;" onclick="toggleTheme()">Toggle Theme</button>
        </div>
    </main>

    <footer>
        &copy; 2026 Ampersand Technologies
    </footer>

    <script>
        // --- 1. THE SECURITY SHIELD INTERCEPTOR ---
        const activeUser = sessionStorage.getItem("ampersand_session");
        
        // Check if they skipped login OR tried hacking an unlisted handle name
        const VALID_USERS = ["arlog15", "grayo14", "austinf15"];
        
        if (!activeUser || !VALID_USERS.includes(activeUser.toLowerCase())) {
            // Instantly activate lockdown frame block before page renders
            document.getElementById("secureShieldBlock").style.display = "block";
            // Crash execution flow completely
            throw new Error("Security Intercept: Unauthorized Token State.");
        }

        // --- 2. GLOBAL CHAT ENGINE ---
        // Sets up a free public message channel named after your company
        const chatChannel = new BroadcastChannel('ampersand_hq_relay');

        // Automatically trigger the join alert update!
        setTimeout(() => {
            chatChannel.postMessage({ type: 'system', text: `${activeUser} has joined the chat.` });
            pushToBox('system', `${activeUser} has joined the chat.`);
        }, 400);

        // Listen for live messages bouncing from your friends' devices
        chatChannel.onmessage = (event) => {
            pushToBox(event.data.type, event.data.text, event.data.user);
        };

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim() !== "") {
                const txt = input.value;
                chatChannel.postMessage({ type: 'user', user: activeUser, text: txt });
                pushToBox('user', txt, activeUser);
                input.value = "";
            }
        }

        function pushToBox(type, text, user = "") {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            if (type === 'system') {
                msg.className = 'system-msg';
                msg.innerText = text;
            } else {
                msg.className = 'user-msg';
                msg.innerHTML = `<span class="user-name">${user}:</span> ${text}`;
            }
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight; // Keep view focused on newest updates
        }

        function handleLogout() {
            sessionStorage.removeItem("ampersand_session");
            localStorage.removeItem("ampersand_remember");
            document.body.classList.remove("loaded");
            setTimeout(() => { window.location.href = 'login.html'; }, 900);
        }

        document.getElementById('msg-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener("load", () => {
            document.body.classList.add("loaded");
        });

        // Theme management hooks
        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme);

        function applyTheme(theme) {
            if (theme === "dark") {
                document.body.classList.add("dark");
            } else {
                document.body.classList.remove("dark");
            }
        }
        function toggleTheme() {
          const isDark = document.body.classList.toggle("dark");localStorage.setItem("theme", isDark ? "dark" : "light");
        }

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>AMPERSAND - Staff Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Better Lexend setup -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
#page-fade { position: fixed; inset: 0; background: var(--bg-light); pointer-events: none; opacity: 1; transition: opacity 0.9s ease; z-index: 9999; }
/* Dark mode support */
body.dark #page-fade { background: var(--bg-dark); }
/* When page is fully visible */
body.loaded #page-fade { opacity: 0; }
:root { --main-color: seagreen; --bg-light: #ffffff; --bg-dark: #1f1f1f; --text-light: #1a1a1a; --text-dark: #f5f5f5; /* Header colors */ --header-light: #f4f7f5; --header-dark: #111111; }
body { margin: 0; font-family: 'Lexend', sans-serif; font-weight: 400; line-height: 1.7; letter-spacing: 0.3px; background-color: var(--bg-light); color: var(--text-light); transition: background-color 0.3s, color 0.3s; display: flex; flex-direction: column; min-height: 100vh; }
header { background-color: var(--header-light); color: var(--text-light); padding: 28px 20px; text-align: center; transition: background-color 0.3s, color 0.3s; border-bottom: 2px solid rgba(0,0,0,0.06); }
header h1 { margin: 0; font-weight: 600; font-size: 2.3rem; letter-spacing: 1px; }
.ampersand { color: var(--main-color); }
main { padding: 50px 25px; max-width: 400px; margin: auto; width: 100%; flex: 1; box-sizing: border-box; }
/* Portal Styling matching your aesthetic */
.portal-box { background: rgba(0,0,0,0.02); padding: 30px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); transition: background-color 0.3s, border-color 0.3s; }
body.dark .portal-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
.form-group { margin-bottom: 20px; }
label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--main-color); letter-spacing: 0.5px; }
input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-family: 'Lexend', sans-serif; box-sizing: border-box; background: transparent; color: inherit; transition: border-color 0.3s; }
body.dark input { border-color: #444; }
input:focus { outline: none; border-color: var(--main-color); }
button { width: 100%; margin-top: 10px; padding: 12px 18px; border: none; border-radius: 10px; background-color: var(--main-color); color: white; cursor: pointer; font-family: 'Lexend', sans-serif; font-weight: 500; font-size: 1rem; transition: 0.2s; }
button:hover { transform: translateY(-1px); opacity: 0.9; }
footer { text-align: center; padding: 20px; font-size: 0.9rem; opacity: 0.6; margin-top: auto; }
/* Dark mode overrides */
body.dark { background-color: var(--bg-dark); color: var(--text-dark); }
body.dark header { background-color: var(--header-dark); color: var(--text-dark); border-bottom: 2px solid rgba(255,255,255,0.08); }
/* NAVBAR */
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 0 20px 20px 20px; margin-bottom: 10px; }
.logo { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }
.hero { text-align: center; }

/* New added styles for verification alerts and checkbox */
.remember-group { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem; user-select: none; }
.remember-group input { accent-color: var(--main-color); cursor: pointer; width: 16px; height: 16px; }
.error-msg { color: #ff5252; font-size: 0.9rem; margin-top: 15px; text-align: center; display: none; font-weight: 500; }
</style>
</head>
<body>
<header>
<nav class="navbar">
<div class="logo">
<span class="ampersand">&amp;</span>AMPERSAND
</div>
</nav>
<div class="hero">
<h1>STAFF LOGIN</h1>
</div>
</header>
<main>
<div class="portal-box">
<!-- Changed action to execute JavaScript verification directly -->
<form id="loginForm" onsubmit="handleLogin(event)">
<div class="form-group">
<p><b>Username</b></p>
<input type="text" id="username" placeholder="" required autocomplete="off">
</div>
<div class="form-group">
<p><b>Password</b></p>
<input type="password" id="password" placeholder="" required>
</div>
<!-- Added Remember Me element -->
<div class="remember-group">
<input type="checkbox" id="rememberMe">
<label style="cursor: pointer;" for="rememberMe">Remember Session</label>
</div>
<button type="submit">Log In</button>
<!-- Added error notice interface block -->
<div class="error-msg" id="errorBlock">ACCESS DENIED</div>
</form>
</div>
<div style="text-align: center; margin-top: 25px;">
<button style="width: auto;" onclick="toggleTheme()">Toggle Theme</button>
</div>
</main>
<footer>
&copy; 2026 Ampersand Technologies
</footer>
<script>
window.addEventListener("load", () => {
document.body.classList.add("loaded");

// Auto-login engine if remember flag was verified previously
const persistentUser = localStorage.getItem("ampersand_remember");
if (persistentUser) {
sessionStorage.setItem("ampersand_session", persistentUser);
window.location.href = `chat.html?user=${encodeURIComponent(persistentUser)}`;
}
});

// Cryptographic encryption utility using native browser APIs
async function sha256(string) {
const utf8 = new TextEncoder().encode(string);
const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// Internal authorized database credentials
const VALID_USERS = ["arlog15", "grayo14", "austinf15"];
const TARGET_HASH = "007debd58683854ef5ece08e0261619e9b41345cecda02582162bbcd02ed24e1";

async function handleLogin(e) {
e.preventDefault();
const userField = document.getElementById("username").value.trim().toLowerCase();
const passField = document.getElementById("password").value;
const errorBlock = document.getElementById("errorBlock");
const rememberMe = document.getElementById("rememberMe").checked;

errorBlock.style.display = "none";

// 1. Username list confirmation check
if (!VALID_USERS.includes(userField)) {
errorBlock.innerText = "ACCESS DENIED: Invalid Staff ID";
errorBlock.style.display = "block";
return;
}

// 2. Hash raw text input string
const inputHash = await sha256(passField);

// 3. Cryptographic hash comparison check
if (inputHash === TARGET_HASH) {
// Set active connection frames inside storage registers
sessionStorage.setItem("ampersand_session", userField);
if (rememberMe) {
localStorage.setItem("ampersand_remember", userField);
} else {
localStorage.removeItem("ampersand_remember");
}

// Smooth layout shift into chat window
document.body.classList.remove("loaded");
setTimeout(() => {
window.location.href = `chat.html?user=${encodeURIComponent(userField)}`;
}, 900);
} else {
errorBlock.innerText = "ACCESS DENIED: Password Mismatch";
errorBlock.style.display = "block";
}
}

// Load saved theme on page load
const savedTheme = localStorage.getItem("theme");
applyTheme(savedTheme);

function applyTheme(theme) {
if (theme === "dark") {
document.body.classList.add("dark");
} else {
document.body.classList.remove("dark");
}
}

// Toggle function
function toggleTheme() {
const isDark = document.body.classList.toggle("dark");
localStorage.setItem("theme", isDark ? "dark" : "light");
}
</script>
<div id="page-fade"></div>
</body>
</html>
